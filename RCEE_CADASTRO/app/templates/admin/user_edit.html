{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0">Editar Usuário</h4>
    <a href="{{ url_for('admin.users') }}" class="btn btn-sm btn-secondary">
      ← Voltar
    </a>
  </div>

  <div class="card">
    <div class="card-body">
      <form method="POST" action="{{ url_for('admin.edit_user', user_id=user.id) }}">
        {{ form.csrf_token if form else '' }}

        <div class="row g-3">
          <div class="col-md-3">
            <label for="name" class="form-label">Nome</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ user.name }}" required>
          </div>

          <div class="col-md-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
          </div>

          <div class="col-md-2">
            <label for="instituicao" class="form-label">Instituição</label>
            <input type="text" class="form-control" id="instituicao" name="instituicao" placeholder="Ex.: EB, EME" maxlength="100" value="{{ user.instituicao or '' }}">
          </div>

          <div class="col-md-2">
            <label for="contato" class="form-label">Contato</label>
            <input type="tel" class="form-control" id="contato" name="contato" placeholder="(00) 00000-0000" maxlength="20" value="{{ user.contato or '' }}">
          </div>

          <div class="col-md-2">
            <label for="role" class="form-label">Perfil</label>
            <select id="role" name="role" class="form-select" required>
              <option value="Admin" {% if user.role == 'Admin' or user.role == Role.ADMIN %}selected{% endif %}>Admin</option>
              <option value="Editor" {% if user.role == 'Editor' or user.role == Role.EDITOR %}selected{% endif %}>Editor</option>
              <option value="Viewer" {% if user.role == 'Viewer' or user.role == Role.VIEWER %}selected{% endif %}>Viewer</option>
            </select>
          </div>
        </div>

        <div class="row g-3 mt-2">
          <div class="col-md-3">
            <label for="password" class="form-label">Nova Senha</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="Deixe em branco se não quiser alterar">
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-md-12 d-flex justify-content-end gap-2">
            <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar Alterações</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
// Máscara de telefone para o campo Contato
document.getElementById('contato')?.addEventListener('input', function(e) {
  let value = e.target.value.replace(/\D/g, '');
  if (value.length <= 11) {
    value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
    value = value.replace(/(\d)(\d{4})$/, '$1-$2');
  }
  e.target.value = value;
});
</script>
{% endblock %}
